<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - PingPro DigiComm</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Navigation Bar and Header Section -->
    <header>
        <!-- Contact Info Section (Phone and Email) -->
        <div class="header-top">
            <div class="contact-info">
                <div class="phone">
                    <img src="https://cdn-icons-png.flaticon.com/512/725/725643.png" alt="Phone Icon" class="icon">
                    <span>+1 (123) 456-7890</span>
                </div>
                <div class="email">
                    <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email Icon" class="icon">
                    <span>business@pingpro.in</span>
                </div>
            </div>
        </div>
        <!-- Navigation Menu -->
        <nav>
            <ul class="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="#">Services</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Section -->
    <main>
        <section class="contact">
            <h1>Contact Us</h1>
            <p>If you have any questions, feel free to reach out to us!</p>
            <!-- Contact Form -->
            <form action="https://formspree.io/f/mwpleqyw" method="POST">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br><br>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>
                
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="4" required></textarea><br><br>
                
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2025 PingPro DigiComm. All rights reserved.</p>
        <a href="#top" class="back-to-top">Back to top</a>
    </footer>
</body>

</html>
